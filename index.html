<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Spinning Cube</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #0f172a;
      perspective: 1000px;
    }
    .scene {
      width: 200px;
      height: 200px;
    }
    .cube {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      animation: spin 8s linear infinite;
    }
    .face {
      position: absolute;
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      font-size: 24px;
      font-weight: bold;
      color: white;
      border: 2px solid rgba(255, 255, 255, 0.5);
    }
    .front  { background: rgba(239, 68, 68, 0.8);  transform: rotateY(0deg) translateZ(100px); }
    .back   { background: rgba(59, 130, 246, 0.8); transform: rotateY(180deg) translateZ(100px); }
    .right  { background: rgba(16, 185, 129, 0.8); transform: rotateY(90deg) translateZ(100px); }
    .left   { background: rgba(245, 158, 11, 0.8); transform: rotateY(-90deg) translateZ(100px); }
    .top    { background: rgba(139, 92, 246, 0.8); transform: rotateX(90deg) translateZ(100px); }
    .bottom { background: rgba(236, 72, 153, 0.8); transform: rotateX(-90deg) translateZ(100px); }

    @keyframes spin {
      0% { transform: rotateX(0deg) rotateY(0deg); }
      100% { transform: rotateX(360deg) rotateY(360deg); }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="cube">
      <div class="face front">Front</div>
      <div class="face back">Back</div>
      <div class="face right">Right</div>
      <div class="face left">Left</div>
      <div class="face top">Top</div>
      <div class="face bottom">Bottom</div>
    </div>
  </div>
</body>
</html>
